<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>PoloTube</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    #search-container {
      max-width: 900px;
      margin: 20px auto;
      display: flex;
      gap: 10px;
    }
    #search-input {
      flex: 1;
      padding: 8px 12px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    #search-btn {
      padding: 8px 16px;
      font-size: 16px;
      background-color: #0073e6;
      border: none;
      border-radius: 4px;
      color: white;
      cursor: pointer;
    }
    #search-btn:hover {
      background-color: #005bb5;
    }
    /* Style des vidéos */
    .video-card {
      cursor: pointer;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>
  <h1>PoloTube</h1>

  <div id="search-container">
    <input type="text" id="search-input" placeholder="Search videos..." />
    <button id="search-btn">Search</button>
  </div>

  <div id="videos"></div>

  <script>
  async function loadRecommendations() {
    const res = await fetch('/api/recommendations');
    return await res.json();
  }
  
  async function searchVideos(query) {
    const res = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
    return await res.json();
  }

    function renderVideos(videos) {
      const videosDiv = document.getElementById('videos');
      videosDiv.innerHTML = ''; // reset
      if (videos.length === 0) {
        videosDiv.innerHTML = '<p>No videos.</p>';
        return;
      }
      videos.forEach(video => {
        const div = document.createElement('div');
        div.className = 'video-card';
        div.innerHTML = `
          <img src="${video.thumbnail}" alt="${video.title}" width="320" />
          <h3>${video.title}</h3>
          <p>Channel: ${video.channel}</p>
        `;
        div.onclick = () => window.location.href = `/video?id=${video.id}`;
        videosDiv.appendChild(div);
      });
    }

  async function init() {
    let videos = await loadRecommendations();
    renderVideos(videos);
  
    const input = document.getElementById('search-input');
    const btn = document.getElementById('search-btn');
  
    async function update() {
      const query = input.value.trim();
  
      if (query === "") {
        videos = await loadRecommendations();
      } else {
        videos = await searchVideos(query);
      }
  
      renderVideos(videos);
    }
  
    btn.addEventListener('click', update);
  
    input.addEventListener('keyup', e => {
      if (e.key === 'Enter') update();
    });
  
    // bonus: retour aux recommandations quand on efface
    input.addEventListener('input', async () => {
      if (input.value.trim() === "") {
        videos = await loadRecommendations();
        renderVideos(videos);
      }
    });
  }

    init();
  </script>
</body>
</html>
