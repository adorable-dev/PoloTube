<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>PoloTube - Watch</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    iframe {
      width: 100%;
      height: 480px;
    }
    .video-player-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }
    .back-btn {
      cursor: pointer;
      color: #0073e6;
      margin-bottom: 10px;
      display: inline-block;
    }
    #channel a {
      color: #0073e6;
      text-decoration: none;
      font-weight: bold;
    }
    #channel a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="video-player-container">
    <div class="back-btn" onclick="window.history.back()">← Back</div>
    <div id="player"></div>
    <h2 id="title"></h2>
    <p id="channel"></p>
    <p id="views"></p>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const videoId = urlParams.get('id');

    if (!videoId) {
      document.body.innerHTML = '<p>Pas de vidéo sélectionnée.</p>';
    } else {
      const playerDiv = document.getElementById('player');
    
      playerDiv.innerHTML = `
        <iframe
          src="https://www.youtube.com/embed/${videoId}?autoplay=1"
          allow="autoplay; encrypted-media"
          allowfullscreen
        ></iframe>
      `;
    
      fetch(`/api/video?id=${videoId}`)
        .then(res => res.json())
        .then(video => {
          if (!video || video.message) {
            document.getElementById('title').textContent = 'Vidéo inconnue';
            return;
          }
    
          document.getElementById('title').textContent = video.title;
    
          document.getElementById('channel').innerHTML =
            `Chaîne: <a href="/channel?id=${video.channelId}">${video.channel}</a>`;
    
          document.getElementById('views').textContent =
            `${Number(video.views).toLocaleString()} vues`;
        });
    }
  </script>
</body>
</html>
